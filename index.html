<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex,nofollow">
    <title>あかね's Gallery</title>
    <style>
        /* 全体の余白を消す */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 背景に透明度を下げた画像を置く（0.7が暗さの調整） */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('your-background.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white;
            font-family: sans-serif;
            text-align: center;
        }

        /* ヘッダー：横幅いっぱい、余白なし */
        header {
            background-color: #5d3523; /* 画像の茶色に近い色 */
            width: 100%;
            padding: 40px 0;
            font-size: 2rem;
            font-weight: bold;
            color: #f5cba7; /* 文字色を少し明るく */
        }

        /* 流れるイラストのコンテナ */
        .scroll-window {
            width: 100%;
            overflow: hidden; /* はみ出た分を隠す */
            padding: 50px 0;
        }

        .scroll-container {
            display: flex;
            width: 200%; /* 画像をループさせるために長めに確保 */
            animation: flow 20s linear infinite; /* 20秒で一周 */
        }

        .scroll-container img {
            height: 150px; /* イラストの高さを揃える */
            margin-right: 20px;
            border: 2px solid white;
        }

        @keyframes flow {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } /* 半分まで行ったら最初に戻る */
        }

        hr {
            width: 80%;
            margin: 20px auto;
            border: 0;
            border-top: 1px solid white;
        }

        /* ゲーム紹介エリア */
        .game-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px;
            flex-wrap: wrap;
        }

        .game-box {
            background-color: #ddd; /* 薄いグレー */
            color: #333;
            width: 250px;
            height: 150px;
            border-radius: 15px; /* 角丸 */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            font-weight: bold;
        }

        .game-title {
            margin-top: 10px;
            font-size: 0.9rem;
        }

        /* SNSリンク（スクロールして下に来たら見える） */
        footer {
            padding: 100px 0 50px;
        }

        .sns-links a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            border: 1px solid white;
            padding: 10px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <header>ヘッダー</header>

    <div class="scroll-window">
        <div class="scroll-container">
            <img src="img1.jpg" alt="">
            <img src="img2.jpg" alt="">
            <img src="img3.jpg" alt="">
            <img src="img1.jpg" alt="">
            <img src="img2.jpg" alt="">
            <img src="img3.jpg" alt="">
        </div>
    </div>

    <hr>

    <div class="game-section">
        <div>
            <div class="game-box">ノベルゲームのサムネ</div>
            <p class="game-title">ゲームのタイトル</p>
        </div>
        <div>
            <div class="game-box">サムネ</div>
            <p class="game-title">タイトルなど</p>
        </div>
        <div>
            <div class="game-box">サムネ</div>
            <p class="game-title">タイトルなど</p>
        </div>
    </div>

    <footer>
        <div class="sns-links">
            <a href="#">X (Twitter)</a>
            <a href="#">Poipiku</a>
        </div>
    </footer>

</body>
</html>
